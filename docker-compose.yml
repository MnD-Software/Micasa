services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stayforge
      POSTGRES_USER: stayforge
      POSTGRES_PASSWORD: stayforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://stayforge:stayforge@postgres:5432/stayforge
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
